name: Windows x64 Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    name: Verify and package unsigned NSIS
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      RUST_BACKTRACE: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust 1.88 x64 MSVC
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install locked JavaScript dependencies
        run: npm ci

      - name: Build Windows runtime and native helpers
        run: |
          npm run build:windows-python-runtime
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/build-windows-native.mjs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build:windows-media-helper
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build unsigned Windows x64 NSIS installer
        run: npm run tauri -- build --target x86_64-pc-windows-msvc --bundles nsis --no-sign --ci

      - name: Collect unsigned installer
        shell: pwsh
        run: |
          $artifactDirectory = Join-Path $PWD "artifacts/windows"
          New-Item -ItemType Directory -Force $artifactDirectory | Out-Null
          $installer = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*-setup.exe" -File | Select-Object -First 1
          if ($null -eq $installer) { throw "NSIS installer was not produced" }
          Copy-Item $installer.FullName (Join-Path $artifactDirectory $installer.Name)
          $hash = Get-FileHash (Join-Path $artifactDirectory $installer.Name) -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  $($installer.Name)" | Set-Content (Join-Path $artifactDirectory "SHA256SUMS.txt") -Encoding ascii

      - name: Upload unsigned installer and checksums
        uses: actions/upload-artifact@v4
        with:
          name: Yunspire-${{ github.sha }}-Windows-x64-unsigned
          path: artifacts/windows/*
          if-no-files-found: error
          retention-days: 14
